---
apiVersion: v1
kind: List
items:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: hotrod
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: hotrod
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: jaeger
          app.kubernetes.io/component: hotrod
      egress:
        - {}
      ingress:
        - {}
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: hotrod
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: hotrod
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: jaeger
          app.kubernetes.io/component: hotrod
      strategy:
        type: Recreate
      template:
        metadata:
          labels:
            app.kubernetes.io/name: jaeger
            app.kubernetes.io/component: hotrod
        spec:
          imagePullSecrets:
            - name: microservices-demo-deployer
          containers:
            - name: hotrod
              image: harbor.CHANGE-ME-PLEASE/microservices-demo/example-hotrod:1.35
              args: ["all"]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                runAsUser: 10000
              ports:
                - containerPort: 8080
                  protocol: TCP
                - containerPort: 8081
                  protocol: TCP
                - containerPort: 8082
                  protocol: TCP
                - containerPort: 8083
                  protocol: TCP
              env:
                - name: JAEGER_AGENT_HOST
                  value: "jaeger-agent"
                - name: JAEGER_AGENT_PORT
                  value: "6831"
  - apiVersion: v1
    kind: Service
    metadata:
      name: hotrod
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: hotrod
    spec:
      ports:
        - name: frontend
          port: 80
          protocol: TCP
          targetPort: 8080
      selector:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: hotrod
